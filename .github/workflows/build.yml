name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        runtime:
          - win-x64
          - win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AltCommand.sln

      - name: Build
        run: dotnet build AltCommand.sln --configuration Release --no-restore

      - name: Publish
        run: >
          dotnet publish src/AltCommand.Windows/AltCommand.Windows.csproj
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish/${{ matrix.runtime }}

      - name: Archive
        shell: pwsh
        run: |
          $archiveName = "AltCommand-${{ matrix.runtime }}-${{ github.sha }}.zip"
          Compress-Archive -Path "publish/${{ matrix.runtime }}/*" -DestinationPath $archiveName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AltCommand-${{ matrix.runtime }}
          path: AltCommand-${{ matrix.runtime }}-${{ github.sha }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-artifacts/*/*.zip --generate-notes
